<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gas Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0f;
      --surface: #161b22;
      --border: #30363d;
      --text: #f0f0f5;
      --text-dim: #8b949e;
      --green: #3fb950;
      --red: #f85149;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    
    .container { max-width: 700px; margin: 0 auto; }
    
    header {
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    
    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }
    
    .coin {
      display: flex;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .coin:last-child { border-bottom: none; }
    
    .coin img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      margin-right: 0.75rem;
    }
    
    .coin-info {
      flex: 1;
    }
    
    .coin-name {
      font-weight: 500;
      font-size: 0.95rem;
    }
    
    .coin-symbol {
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    
    .coin-price {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .price-value {
      font-weight: 500;
    }
    
    .price-change {
      font-size: 0.8rem;
    }
    
    .green { color: var(--green); }
    .red { color: var(--red); }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.25rem;
    }
    
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 500;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0.5rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: var(--border);
    }
    
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
    }
    
    .error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Gas Tracker</h1>
      <p class="subtitle">Current gas prices on Base/Ethereum</p>
    </header>
    
    <div id="error"></div>
    
    <div class="card">
      <h2>Top Cryptocurrencies</h2>
      <div id="crypto">
        <div class="loading">Loading prices...</div>
      </div>
    </div>
    
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total Market Cap</div>
        <div class="stat-value" id="totalMarket">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">BTC Dominance</div>
        <div class="stat-value" id="btcDom">--</div>
      </div>
    </div>
    
    <button class="btn" onclick="loadData()">↻ Refresh Data</button>
    
    <div class="footer">
      Data from CoinGecko · Updated 2:18:35 AM
    </div>
  </div>
  
  <script>
    async function loadData() {
      const cryptoDiv = document.getElementById('crypto');
      const errorDiv = document.getElementById('error');
      const totalDiv = document.getElementById('totalMarket');
      const btcDiv = document.getElementById('btcDom');
      
      cryptoDiv.innerHTML = '<div class="loading">Loading...</div>';
      errorDiv.innerHTML = '';
      
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false');
        
        if (!res.ok) throw new Error('API request failed');
        
        const data = await res.json();
        
        cryptoDiv.innerHTML = data.map(c => `
          <div class="coin">
            <img src="${c.image}" alt="${c.symbol}">
            <div class="coin-info">
              <div class="coin-name">${c.name}</div>
              <div class="coin-symbol">${c.symbol.toUpperCase()}</div>
            </div>
            <div class="coin-price">
              <div class="price-value">$${c.current_price.toLocaleString()}</div>
              <div class="price-change ${c.price_change_percentage_24h >= 0 ? 'green' : 'red'}">
                ${c.price_change_percentage_24h >= 0 ? '▲' : '▼'} ${Math.abs(c.price_change_percentage_24h).toFixed(2)}%
              </div>
            </div>
          </div>
        `).join('');
        
        // Stats
        const total = data.reduce((s, c) => s + c.market_cap, 0);
        const btcDom = ((data[0].market_cap / total) * 100).toFixed(1);
        
        totalDiv.textContent = '$' + (total / 1e12).toFixed(2) + 'T';
        btcDiv.textContent = btcDom + '%';
        
      } catch (e) {
        errorDiv.innerHTML = '<div class="error">Failed to load data. Try again.</div>';
        cryptoDiv.innerHTML = '<div class="loading">Error loading data</div>';
      }
    }
    
    loadData();
  </script>
</body>
</html>
